# ============================================================
# ci.yml — Continuous Integration Workflow
# ============================================================
# Triggers:
#   - pull_request targeting main or develop  → validates every PR before merge
#   - push to develop                         → validates integration branch on every push
#
# No secrets required — the test suite uses mocks and does not hit live APIs.
#
# Cache strategy: Poetry virtualenv keyed on poetry.lock hash.
#   - Cache miss  : ~3 min (full dependency install)
#   - Cache hit   : ~30 sec
# ============================================================

name: CI — Lint and Test

on:
  pull_request:
    branches:
      - main
      - develop

  push:
    branches:
      - develop

# Minimal permissions: read-only checkout is all CI needs.
# Write access is intentionally withheld to prevent supply-chain attacks.
permissions:
  contents: read

jobs:
  lint-and-test:
    name: Run linters, type checker, and test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        id: poetry-cache
        with:
          path: |
            ~/.cache/pypoetry
            ~/.local/share/pypoetry
          # Cache is invalidated when poetry.lock changes — ensures reproducibility
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install Poetry
        run: pip install "poetry>=1.8.0,<3.0.0"

      - name: Install all dependencies including dev group
        run: |
          # Uses committed poetry.lock directly — never regenerates the lock file in CI
          # Dev group includes: black, ruff, mypy, pytest
          poetry install --no-interaction --no-ansi

      - name: Run Black formatter check
        run: |
          echo "--- Black: checking code formatting ---"
          poetry run black --check src/ tests/
          echo "Black check passed."

      - name: Run Ruff linter
        run: |
          echo "--- Ruff: running linter ---"
          poetry run ruff check src/ tests/
          echo "Ruff check passed."

      - name: Run mypy static type checker
        run: |
          echo "--- mypy: running type checker ---"
          poetry run mypy src/
          echo "mypy check passed."

      - name: Run pytest test suite
        run: |
          echo "--- pytest: running test suite ---"
          poetry run pytest tests/ -v --tb=long
          echo "All tests passed."
