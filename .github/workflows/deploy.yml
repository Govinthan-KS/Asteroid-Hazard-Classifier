# ============================================================
# deploy.yml — HuggingFace Spaces Deployment Workflow
# ============================================================
# Triggers:
#   - push to main         → automatic deployment on every merge to production
#   - workflow_dispatch    → manual redeploy from GitHub Actions UI
#   - workflow_call        → called by retrain.yml on successful champion promotion (Phase 9)
#
# Secrets required (GitHub Secrets):
#   - HUGGINGFACE_TOKEN    → HuggingFace API token with write access to the target Space
#
# Repository variables required (GitHub Actions → Variables):
#   - HF_USERNAME         → your HuggingFace username (e.g. KSG20)
#   - HF_SPACE_ID         → HuggingFace Space in "owner/space-name" format
#
# Runtime secrets (set in HF Spaces UI → Settings → Repository Secrets — NOT here):
#   - NASA_API_KEY, DAGSHUB_TOKEN, MLFLOW_TRACKING_URI,
#     DAGSHUB_REPO_OWNER, DAGSHUB_REPO_NAME
# ============================================================

name: Deploy to HuggingFace Spaces

on:
  push:
    branches:
      - main

  workflow_dispatch:
    # Manual trigger from GitHub Actions UI for ad-hoc redeployments

  workflow_call:
    # Called by retrain.yml when a new @champion is promoted — triggers redeploy to HuggingFace Spaces

# contents: write   → required for git push to HuggingFace remote
# actions: read     → allows workflow_call from retrain.yml
permissions:
  contents: write
  actions: read

jobs:
  deploy-to-hf-spaces:
    name: Push repository to HuggingFace Spaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with LFS support
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for a clean force-push
          lfs: true        # fetch any Git LFS objects (DVC metadata, binary assets)


      - name: Configure global URL rewrite for HuggingFace auth
        run: |
          # Rewrites every https://huggingface.co/ request to include the token
          # before git even sends the request — no interactive prompt possible.
          git config --global \
            url."https://user:${{ secrets.HUGGINGFACE_TOKEN }}@huggingface.co/".insteadOf \
            "https://huggingface.co/"

      - name: Add HuggingFace Spaces as git remote
        run: |
          git remote add space https://huggingface.co/spaces/${{ vars.HF_SPACE_ID }}

      - name: Force-push repository to HuggingFace Spaces
        run: |
          git push --force space HEAD:main
          echo "::notice::Force-push to HF Space '${{ vars.HF_SPACE_ID }}' completed."

      - name: Log deployment outcome
        run: |
          echo "=================================================="
          echo "  Deployment Summary"
          echo "=================================================="
          echo "  Space        : ${{ vars.HF_SPACE_ID }}"
          echo "  Branch       : main"
          echo "  Commit SHA   : ${{ github.sha }}"
          echo "  Triggered by : ${{ github.event_name }}"
          echo "  Space URL    : https://huggingface.co/spaces/${{ vars.HF_SPACE_ID }}"
          echo "=================================================="
          echo "HuggingFace Spaces will now rebuild the Docker image automatically."
          echo "Monitor build progress at the URL above."
