# ============================================================
# retrain.yml — NEO-Sentinel Scheduled Retraining Pipeline
# ============================================================
# Triggers:
#   - schedule (cron)    → Daily at 13:00 IST (07:30 UTC)
#   - workflow_dispatch  → Manual via GitHub Actions UI or Discord !retrain
#
# Pipeline:
#   1. Ingest     — fetch latest 30-day NASA NeoWs data
#   2. Train      — run multi-model benchmarking loop
#   3. Detect     — compare @champion run_id before vs after training
#   4. Promote    — trainer.py handles promotion automatically
#   5. Redeploy   — call deploy.yml only when a new champion is promoted
#
# Secrets required (GitHub Secrets):
#   - NASA_API_KEY, DAGSHUB_TOKEN, MLFLOW_TRACKING_URI, HUGGINGFACE_TOKEN
#
# Repository variables required (GitHub Actions → Variables):
#   - DAGSHUB_REPO_OWNER, DAGSHUB_REPO_NAME
# ============================================================

name: "NEO-Sentinel Scheduled Retraining Pipeline"

# Opt into Node.js 24 for all actions (checkout, cache, setup-python).
# Required before June 2nd 2026 when Node.js 20 is removed from runners.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 07:30 UTC = 13:00 IST
    - cron: "30 7 * * *"

  workflow_dispatch:
    # Manual trigger: GitHub Actions UI  OR  Discord !retrain command
    # The Discord bot sends a POST to /repos/{owner}/{repo}/actions/workflows/retrain.yml/dispatches
    # with Authorization: token $GITHUB_TOKEN — ensure GITHUB_TOKEN has 'actions: write' scope.

# ── Permissions ─────────────────────────────────────────────────────────────
# 'actions: write'   → required for workflow_dispatch and calling deploy.yml
# 'contents: write'  → required by deploy.yml (git push to HF remote) when
#                      called via workflow_call — caller permissions cap the callee
permissions:
  actions: write
  contents: write


jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1 — Ingest, Train, Benchmark, Promote
  # ──────────────────────────────────────────────────────────────────────────
  retrain-and-benchmark:
    name: "Ingest \u2192 Train \u2192 Benchmark \u2192 Promote"
    runs-on: ubuntu-latest

    # Expose the promotion result to Job 2
    outputs:
      champion_promoted: ${{ steps.detect-promotion.outputs.champion_promoted }}
      champion_run_id:   ${{ steps.detect-promotion.outputs.champion_run_id }}

    env:
      # ── Headless auth — set at job level so every step inherits them ──
      DAGSHUB_NON_INTERACTIVE: "1"
      DAGSHUB_USER_TOKEN:      ${{ secrets.DAGSHUB_TOKEN }}
      DAGSHUB_TOKEN:           ${{ secrets.DAGSHUB_TOKEN }}
      DAGSHUB_REPO_OWNER:      ${{ vars.DAGSHUB_REPO_OWNER }}
      DAGSHUB_REPO_NAME:       ${{ vars.DAGSHUB_REPO_NAME }}
      MLFLOW_TRACKING_URI:     ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ vars.DAGSHUB_REPO_OWNER }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      NASA_API_KEY:            ${{ secrets.NASA_API_KEY }}
      PYTHONPATH:              src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: ${{ runner.os }}-poetry-

      - name: Install Poetry and project dependencies
        run: |
          pip install --quiet "poetry>=1.8.0,<3.0.0"
          poetry install --no-interaction --no-ansi --only main

      # ── Snapshot @champion BEFORE training ────────────────────────────────
      - name: Record pre-training @champion run_id
        id: pre-champion
        run: |
          CHAMPION_BEFORE=$(poetry run python - <<'PYEOF'
          import os, mlflow
          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          client = mlflow.tracking.MlflowClient()
          try:
              mv = client.get_model_version_by_alias(
                  "asteroid-hazard-classifier", "champion"
              )
              print(mv.run_id)
          except Exception:
              print("none")
          PYEOF
          )
          echo "run_id=${CHAMPION_BEFORE}" >> "$GITHUB_OUTPUT"
          echo "[NEO-Sentinel] Pre-training @champion: ${CHAMPION_BEFORE}"

      # ── Step 1: Ingest ────────────────────────────────────────────────────
      - name: "Step 1 \u2014 Ingest latest NASA NeoWs data (30-day window)"
        run: |
          echo "[NEO-Sentinel] Starting NASA NeoWs ingestion..."
          poetry run python -m asteroid_classifier.data.ingestion
          echo "[NEO-Sentinel] Ingestion complete."

      # ── Step 1.5: Validate ───────────────────────────────────────────────
      # Hard gate — if ANY Great Expectations rule fails the step exits non-zero,
      # the job fails immediately, and training NEVER starts.
      # The module auto-discovers the ingested CSV from Hydra config (no hardcoding).
      - name: "Step 1.5 \u2014 Validate ingested data (Great Expectations)"
        run: |
          echo "[NEO-Sentinel] Running Great Expectations validation suite..."
          poetry run python -m asteroid_classifier.data.validation
          echo "[NEO-Sentinel] Validation gate passed — proceeding to training."

      # ── Step 1.75: Version dataset with DVC ──────────────────────────────
      # Non-blocking by design: versioning.py always exits 0.
      # continue-on-error: true is a second safeguard in case of unexpected
      # runner-level failures (OOM, DVC binary missing, etc.).
      # Training is NEVER halted by a DVC push failure.
      - name: "Step 1.75 \u2014 Version dataset with DVC (non-blocking)"
        continue-on-error: true
        run: |
          echo "[NEO-Sentinel] Versioning dataset with DVC and pushing to DagsHub..."
          poetry run python -m asteroid_classifier.data.versioning
          echo "[NEO-Sentinel] DVC versioning step complete."

      # ── Step 2: Train + Benchmark + Promote (all in trainer.py) ──────────
      - name: "Step 2 \u2014 Multi-model benchmarking"
        run: |
          echo "[NEO-Sentinel] Starting multi-model benchmarking pipeline..."
          set -o pipefail
          poetry run python -m asteroid_classifier.models.trainer 2>&1 \
            | grep -Ev "View (run|experiment) at:"
          echo "[NEO-Sentinel] Benchmarking complete."

      # ── Snapshot @champion AFTER training and compare ─────────────────────
      - name: Detect if @champion was promoted
        id: detect-promotion
        run: |
          CHAMPION_AFTER=$(poetry run python - <<'PYEOF'
          import os, mlflow
          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          client = mlflow.tracking.MlflowClient()
          try:
              mv = client.get_model_version_by_alias(
                  "asteroid-hazard-classifier", "champion"
              )
              print(mv.run_id)
          except Exception:
              print("none")
          PYEOF
          )
          echo "[NEO-Sentinel] Post-training @champion: ${CHAMPION_AFTER}"
          echo "champion_run_id=${CHAMPION_AFTER}" >> "$GITHUB_OUTPUT"

          if [ "${CHAMPION_AFTER}" != "${{ steps.pre-champion.outputs.run_id }}" ]; then
            echo "champion_promoted=true" >> "$GITHUB_OUTPUT"
            echo "::notice::NEO-Sentinel \U0001f3c6 New @champion promoted (${CHAMPION_AFTER}). Triggering redeployment."
          else
            echo "champion_promoted=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NEO-Sentinel \u2139\ufe0f  @champion unchanged (${CHAMPION_AFTER}). Skipping redeployment."
          fi

      - name: Pipeline summary
        run: |
          echo "=================================================="
          echo "  NEO-Sentinel Retraining Pipeline — Summary"
          echo "=================================================="
          echo "  Date        : $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "  Triggered by: ${{ github.event_name }}"
          echo "  Champion    : ${{ steps.detect-promotion.outputs.champion_run_id }}"
          echo "  Promoted    : ${{ steps.detect-promotion.outputs.champion_promoted }}"
          echo "=================================================="


  # ──────────────────────────────────────────────────────────────────────────
  # Job 2 — Redeploy (only runs when a new champion was promoted)
  # ──────────────────────────────────────────────────────────────────────────
  redeploy:
    name: "Redeploy \u2192 HuggingFace Spaces"
    needs: retrain-and-benchmark
    if: needs.retrain-and-benchmark.outputs.champion_promoted == 'true'

    # Reuse the entire deploy.yml workflow — inherits all secrets automatically
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
