# configs/training/training.yaml
test_size: 0.2
random_state: 42
use_smote: true
mlflow_tracking_uri: "https://dagshub.com/Govinthan-KS/Asteroid-Hazard-Classifier.mlflow"

thresholds:
  # Tuned for sparse 30-day rolling datasets (~30-300 hazardous records).
  # XGBoost baseline: recall=1.00 | f1=0.55 | roc_auc=0.86 | precision≈0.38
  # Revert to production targets when dataset volume grows:
  #   recall: 0.90 | f1: 0.85 | roc_auc: 0.92
  recall:  0.70
  f1:      0.50
  roc_auc: 0.80
