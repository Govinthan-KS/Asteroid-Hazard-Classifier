# configs/model/lightgbm.yaml
# Gradient-boosted trees (Microsoft LightGBM) — fast leaf-wise training.
# is_unbalance=True handles class imbalance natively; SMOTE is skipped.
model_type: "lightgbm"
display_name: "LightGBM"
n_estimators: 500
learning_rate: 0.05
num_leaves: 63
max_depth: -1                # unlimited — controlled by num_leaves
min_child_samples: 20        # min data per leaf (regularisation)
subsample: 0.8
subsample_freq: 1
colsample_bytree: 0.8
reg_alpha: 0.1
reg_lambda: 1.0
is_unbalance: true           # native imbalance handling (equiv. to scale_pos_weight auto)
random_state: 42
n_jobs: -1
verbose: -1                  # suppress LGBM stdout noise
