# configs/model/random_forest.yaml
# Ensemble of decision trees — strong baseline for imbalanced classification.
# Uses class_weight="balanced" natively; SMOTE is skipped for this estimator.
model_type: "random_forest"
display_name: "Random Forest"
n_estimators: 500
max_depth: 20
min_samples_split: 5
min_samples_leaf: 2
max_features: "sqrt"
class_weight: "balanced"     # upweights minority class without synthetic sampling
bootstrap: true
oob_score: true              # out-of-bag estimate for free validation signal
random_state: 42
n_jobs: -1
